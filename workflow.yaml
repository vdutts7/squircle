# webp icon workflow — machine-parseable
flow:
  - install: "cp bin/squircle.sh bin/get-bg-color.sh bin/mask.png \$CURTOOLS/ ; alias squircle='\$CURTOOLS/squircle.sh'"
  - copy: "$SQUIRCLE/webp/"
    note: "$SQUIRCLE = $A/squircle (this repo, check ~/.zshrc); no auto-run"
  - run: "squircle <file>  OR  squircle <dir> (batch, parallel); default size 1024"
  - commit: "pre-commit blocks unless normalized"

normalized:
  path: "webp/<name>.webp"
  size: 1024x1024
  format: webp
  metadata: stripped

hook:
  allow: ["webp/**/*.webp @ 1024x1024", "non-image files in root"]
  block: ["webp/**/*.{png,icns,...}", "root images", "webp/**/*.webp !1024x1024"]
  on_allow: "strip metadata"

layout:
  root: "config, docs, bin, hooks"
  bin: "squircle.sh, get-bg-color.sh, mask.png"
  webp: "icons + source images; use subdirs for namespaces (e.g. webp/aws/, webp/macos/)"
